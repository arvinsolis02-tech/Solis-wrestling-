<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrestling Stance and Motion App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Wrestling Stances and Motions</h1>
        <button id="startTimer">Start Timer</button>
        <div id="timer">00:00</div>
        <div id="callout"></div>
        <div id="stances">
            <button class="stance-btn" data-stance="stance1">Stance 1</button>
            <button class="stance-btn" data-stance="stance2">Stance 2</button>
            <button class="stance-btn" data-stance="stance3">Stance 3</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
